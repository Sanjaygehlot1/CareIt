<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme-careit') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        const bgColor = theme === 'dark' ? '#0a0a0a' : '#f9fafb';
        const fgColor = theme === 'dark' ? '#f9fafb' : '#111827';
        document.documentElement.style.backgroundColor = bgColor;
        document.documentElement.style.color = fgColor;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
      :root { height: 100%; width: 100%; margin: 0; padding: 0; }
      body { margin: 0; padding: 0; min-height: 100%; width: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
    <title>CareIt</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
